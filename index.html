<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Goal Tracker</title>
    <style>
        :root { --blue: #007AFF; --bg: #F2F2F7; --card: #FFF; --gray: #8E8E93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: env(safe-area-inset-top) 20px 20px; }
        .page { display: none; }
        .active { display: block; }
        
        /* Home Page Styles */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 34px; margin: 0; }
        .add-btn { font-size: 30px; color: var(--blue); cursor: pointer; text-decoration: none; }
        
        .goal-card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 15px; cursor: pointer; }
        .goal-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }
        .progress-bar { height: 8px; background: #E5E5EA; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; }

        /* Detail Page Styles */
        .back-btn { color: var(--blue); cursor: pointer; display: inline-block; margin-bottom: 20px; font-weight: 500; }
        .stat-box { background: var(--card); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .history-list { background: var(--card); border-radius: 12px; list-style: none; padding: 0; margin: 0; }
        .history-item { padding: 12px 16px; border-bottom: 1px solid #E5E5EA; display: flex; justify-content: space-between; }
        .history-item:last-child { border-bottom: none; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #DDD; border-radius: 8px; box-sizing: border-box; }
        .action-btn { background: var(--blue); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="header">
            <h1>Goals</h1>
            <div class="add-btn" onclick="showAddGoal()">+</div>
        </div>
        <div id="goal-list"></div>
    </div>

    <div id="detail-page" class="page">
        <div class="back-btn" onclick="showHome()">← Back</div>
        <h1 id="detail-title">Goal Name</h1>
        <div class="stat-box">
            <div style="font-size: 14px; color: var(--gray);">Progress</div>
            <div style="font-size: 32px; font-weight: bold;" id="detail-progress">0 / 100 hrs</div>
        </div>
        
        <input type="number" id="add-hours-input" placeholder="Add hours (e.g. 2)">
        <button class="action-btn" onclick="addHours()">Log Practice</button>

        <h3 style="margin-top: 30px;">History</h3>
        <div id="detail-history" class="history-list"></div>
        <button onclick="deleteGoal()" style="background:none; color:red; border:none; margin-top:40px; width:100%; text-align:center;">Delete Goal</button>
    </div>

    <script>
        let goals = JSON.parse(localStorage.getItem('myAppGoals')) || [];
        let currentGoalIndex = null;

        function showHome() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('home-page').classList.add('active');
            renderGoals();
        }

        function showDetail(index) {
            currentGoalIndex = index;
            const goal = goals[index];
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('detail-page').classList.add('active');
            
            document.getElementById('detail-title').innerText = goal.name;
            document.getElementById('detail-progress').innerText = `${goal.current} / ${goal.target} hrs`;
            
            const historyHtml = goal.history.map(h => `
                <div class="history-item">
                    <span>${h.amount} hrs</span>
                    <span style="color:var(--gray)">${h.date}</span>
                </div>
            `).reverse().join('');
            document.getElementById('detail-history').innerHTML = historyHtml || '<div style="padding:16px; color:var(--gray)">No entries yet</div>';
        }
