<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Practice Tracker</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-gray: #8E8E93;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 20px;
            padding-top: 60px; /* Space for iOS status bar */
            color: var(--ios-text);
        }
        h1 { font-size: 34px; font-weight: 700; margin-bottom: 20px; }
        
        .goal-card {
            background: var(--ios-card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .goal-header { display: flex; justify-content: space-between; align-items: center; }
        .goal-title { font-size: 20px; font-weight: 600; margin: 0; }
        .goal-total { font-size: 24px; font-weight: 700; color: var(--ios-blue); margin: 10px 0; }
        
        .input-row { display: flex; gap: 10px; margin-top: 15px; }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            font-size: 16px;
            background: #F9F9F9;
        }
        button {
            background: var(--ios-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
        }
        button:active { opacity: 0.7; }

        .history-section { margin-top: 30px; }
        .history-item {
            background: var(--ios-card);
            padding: 12px 15px;
            border-bottom: 1px solid #E5E5EA;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .history-item:first-child { border-radius: 10px 10px 0 0; }
        .history-item:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
        .label-gray { color: var(--ios-gray); }
    </style>
</head>
<body>

    <h1>My Goals</h1>

    <div class="goal-card">
        <div class="goal-header">
            <p class="goal-title">🏃‍♂️ Running</p>
        </div>
        <div class="goal-total"><span id="total-running">0</span> hrs</div>
        <div class="input-row">
            <input type="number" id="input-running" placeholder="Hours" step="0.5">
            <button onclick="addEntry('running')">Add</button>
        </div>
    </div>

    <div class="goal-card">
        <div class="goal-header">
            <p class="goal-title">🤖 AI Knowledge</p>
        </div>
        <div class="goal-total"><span id="total-ai">0</span> hrs</div>
        <div class="input-row">
            <input type="number" id="input-ai" placeholder="Hours" step="0.5">
            <button onclick="addEntry('ai')">Add</button>
        </div>
    </div>

    <div class="history-section">
        <h2 style="font-size: 20px;">History</h2>
        <div id="history-list">
            </div>
    </div>

    <script>
        // State management
        let data = JSON.parse(localStorage.getItem('myTrackerData')) || {
            running: 0,
            ai: 0,
            history: []
        };

        function updateDisplay() {
            document.getElementById('total-running').innerText = data.running.toFixed(1);
            document.getElementById('total-ai').innerText = data.ai.toFixed(1);
            
            const historyDiv = document.getElementById('history-list');
            historyDiv.innerHTML = data.history.slice(-5).reverse().map(item => `
                <div class="history-item">
                    <span><strong>${item.goal}</strong>: ${item.amount}h</span>
                    <span class="label-gray">${item.date}</span>
                </div>
            `).join('');
        }

        function addEntry(goalKey) {
            const input = document.getElementById(`input-${goalKey}`);
            const val = parseFloat(input.value);
            
            if (!isNaN(val) && val > 0) {
                data[goalKey] += val;
                
                // Add to history
                const now = new Date();
                const dateString = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                data.history.push({
                    goal: goalKey === 'running' ? 'Running' : 'AI Knowledge',
                    amount: val,
                    date: dateString
                });

                localStorage.setItem('myTrackerData', JSON.stringify(data));
                input.value = '';
                updateDisplay();
            }
        }

        updateDisplay();
    </script>
</body>
</html>
