<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Practice Tracker</title>
    <style>
        :root {
            --primary: #5856D6;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .stats-card {
            background: var(--primary);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(88, 86, 214, 0.3);
            margin-bottom: 20px;
        }
        .stats-card h1 { margin: 0; font-size: 3rem; }
        .input-group {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 15px;
            border: 1px solid #DDD;
            border-radius: 10px;
            font-size: 1rem;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-card">
        <p>Total Practice Time</p>
        <h1 id="totalHours">0</h1>
        <p>Hours</p>
    </div>

    <div class="input-group">
        <input type="number" id="hoursInput" placeholder="Enter hours (e.g. 1.5)" step="0.1">
        <button onclick="addHours()">Add to Tally</button>
        <button onclick="resetTally()" style="background: #FF3B30; margin-top: 10px; font-size: 0.8rem;">Reset</button>
    </div>
</div>

<script>
    // Load existing data from LocalStorage
    let total = parseFloat(localStorage.getItem('practiceTotal')) || 0;
    document.getElementById('totalHours').innerText = total.toFixed(1);

    function addHours() {
        const input = document.getElementById('hoursInput');
        const val = parseFloat(input.value);
        
        if (!isNaN(val) && val > 0) {
            total += val;
            localStorage.setItem('practiceTotal', total);
            document.getElementById('totalHours').innerText = total.toFixed(1);
            input.value = '';
        }
    }

    function resetTally() {
        if(confirm("Are you sure you want to clear your progress?")) {
            total = 0;
            localStorage.setItem('practiceTotal', 0);
            document.getElementById('totalHours').innerText = '0';
        }
    }
</script>

</body>
</html>
